// ===== RANDOMIZATION FUNCTION =====
// Picks one random scenario per condition (2 agent types × 3 capability levels = 6 total),
// then shuffles the order so presentation is randomised across participants.
function getRandomizedScenarios() {
  const agent = ['human', 'ai'];
  const outcome = ['high', 'medium', 'low'];
  const selectedScenarios = [];

  for (const agentVal of agent) {
    for (const outcomeVal of outcome) {
      const matching = scenarios.filter(s => s.agent === agentVal && s.outcome === outcomeVal);
      if (matching.length > 0) {
        const randomIndex = Math.floor(Math.random() * matching.length);
        selectedScenarios.push(matching[randomIndex]);
      }
    }
  }

  // Fisher-Yates shuffle
  for (let i = selectedScenarios.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [selectedScenarios[i], selectedScenarios[j]] = [selectedScenarios[j], selectedScenarios[i]];
  }

  return selectedScenarios;
}

function buildAiItem(item, scale) {
  const cells = scale.map((opt, i) =>
    `<td><input type="radio" name="${item.name}" value="${opt.value}"${i === 0 ? ' required' : ''}></td>`
  ).join('');
  return `<tr><td class="likert-question">${item.text}</td>${cells}</tr>`;
}

function buildRandomisedAiItems() {
  const attnCheck   = aiItems.find(i => i.valence === 'check');
  const scoredItems = aiItems.filter(i => i.valence !== 'check');
  const shuffled = [...scoredItems];
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  const insertAt = Math.floor(Math.random() * (shuffled.length - 1)) + 1;
  shuffled.splice(insertAt, 0, attnCheck);
  return shuffled;
}

          '<div style="text-align:center; margin-top:5em; font-family:sans-serif;">' +
          '<h2>Thank you for your time.</h2>' +
          '<p>You have chosen not to participate. You may now close this window.</p>' +
          '</div>'
        );
      }
    }
  },

  // TRIAL 3: Welcome instructions
  {
    type: jsPsychInstructions,
    pages: ['<h1>Welcome!</h1><p>This survey will take about 20 minutes. You will be asked demographic questions, followed by a series of short scenarios to evaluate.</p>'],
    show_clickable_nav: true,
    button_label_next: 'Begin'
  },
  // TRIALS 3–5: Demographics, political orientation, AI attitudes scales
  demographics,
  politicalOrientation,
  attitudesAI
];

// ===== GENERATE AND ADD SCENARIO TRIALS =====
// One scenario per condition (human/ai × high/medium/low), presented in random order.
const randomizedScenarios = getRandomizedScenarios();
let scenarioCount = 0;

randomizedScenarios.forEach(scenario => {
  scenarioCount++;
  timeline.push({
    type: jsPsychSurveyLikert,
    preamble: `
      <p class="scenario-counter">Scenario ${scenarioCount} of 6</p>
      <div class="stimulus-box">${scenario.text}</div>
      <p class="cooperation-question">How likely would you be to choose to work with this person in the future?</p>
    `,
    questions: [{
      prompt: 'I would be willing to cooperate with this person in the future.',
      name: `scenario_${scenario.id}_${scenario.agent}_${scenario.outcome}`,
      labels: ['Strongly Disagree', 'Disagree', 'Somewhat Disagree', 'Neutral', 'Somewhat Agree', 'Agree', 'Strongly Agree']
    }],
    data: {
      scenario_id: scenario.id,
      task: scenario.task,
      agent: scenario.agent,
      outcome: scenario.outcome
    }
  });
});

// ===== SAVE DATA TRIAL =====
// Tags all rows and downloads the CSV before the end screen appears.
timeline.push({
  type: jsPsychCallFunction,
  func: function() {
    jsPsych.data.addProperties({
      prolific_id: prolificID,
      study_start_time: studyStartTime
    });
    // Send data to DataPipe, which saves it to your linked OSF project.
    // Each participant's responses are saved as a separate CSV file named by their Prolific ID.
    // To switch to a different OSF project, log into pipe.jspsych.org and change the linked project there — no code change needed.
    fetch('https://pipe.jspsych.org/api/data/', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        Accept: '*/*',
      },
      body: JSON.stringify({
        experimentID: 'C2TuYlgg9E0W',
        filename: prolificID + '_' + studyStartTime.replace(/[:.]/g, '-') + '.csv',
        data: jsPsych.data.get().csv(),
      }),
    });
  }
});

// ===== END SCREEN =====
// IMPORTANT: Replace PROLIFIC_CODE_HERE with your actual completion code from Prolific
// (found in your study settings under Completion > Completion code)
timeline.push({
  type: jsPsychHtmlButtonResponse,
  stimulus: `
    <h1>Thank you for completing the study!</h1>
    <p>Your responses have been saved.</p>
    <p>Please click the button below to confirm your submission on Prolific and receive your payment.</p>
  `,
  choices: ['Complete on Prolific'],
  on_finish: function() {
    window.location.href = 'https://app.prolific.com/submissions/complete?cc=PROLIFIC_CODE_HERE';
  }
});

// ===== START THE EXPERIMENT =====
jsPsych.run(timeline);
</script>
</html>
